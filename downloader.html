<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader - FingerprintConvert</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dark-theme">
    <header>
        <nav class="container">
            <div class="logo">Fingerprint<span>Convert</span></div>
        </nav>
    </header>
    <main class="container">
        <section class="converter-section">
            <h1>Video Downloader</h1>
            <p>Download videos from your favorite platforms.</p>
            <div class="input-group">
                <input type="text" placeholder="Paste video URL here..." id="video-url">
                <button class="primary-btn">Analyze</button>
            </div>
            <p class="status-msg">Feature currently in development.</p>
        </section>
    </main>
</body>
</html>
